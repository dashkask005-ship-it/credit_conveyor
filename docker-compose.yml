services:
  postgres:
    image: postgres:15
    container_name: credit-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
       - ./deal_service/src/main/resources/db/changelog/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
        - credit-network
        
  # Сервис заявок
  deal-service:
    build:
        context: .
        dockerfile: deal_service/Dockerfile
    container_name: deal-service
    ports:
        - "8080:8080"
    environment:
        # Настройки БД
        DB_URL: jdbc:postgresql://postgres:5432/postgres
        DB_USERNAME: ${POSTGRES_USER}
        DB_PASSWORD: ${POSTGRES_PASSWORD}
        
        NOTIFICATION_URL: http://notification-service:8081
        
        LOGGING_LEVEL_COM_PRACTIKA: DEBUG
        
        JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m"
    
    volumes:
        - ./logs/deal-service:/app/logs
    
    depends_on:
        postgres:
            condition: service_healthy
    networks:
        - credit-network
    
  # Сервис уведомлений
  notification-service:
       build:
          context: .
          dockerfile: notification_service/Dockerfile
       container_name: notification-service
       ports:
            - "8081:8081"
       environment:
            # Настройки почты
            MAIL_USERNAME: ${MAIL_USERNAME}
            MAIL_PASSWORD: ${MAIL_PASSWORD}
            
            JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
       volumes:
            - ./logs/notification-service:/app/logs
       networks:
            - credit-network

volumes:
  postgres_data:
    driver: local

networks:
    credit-network:
        driver: bridge
        